<div class="hero">
  <p class="eyebrow">Loaded</p>
  <h1>Create your <span>account.</span></h1>
  <p class="sub">Sign up to build and track your vertical jump program.</p>
</div>

<div class="clipboard">
  <form (ngSubmit)="submit()">
    <div class="field">
      <label>Email</label>
      <div class="unit-input">
        <input type="email" name="email" [(ngModel)]="email" required autocomplete="email" />
      </div>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="unit-input">
        <input type="password" name="password" [(ngModel)]="password" required minlength="6" autocomplete="new-password" />
      </div>
    </div>
    <button class="go-btn" type="submit" [disabled]="submitting()">
      {{ submitting() ? 'Signing up...' : 'Sign up' }}
    </button>
    @if (errorMsg()) {
      <div class="error-box">{{ errorMsg() }}</div>
    }
  </form>
  <hr class="divider" />
  <p class="sub">Already have an account? <a routerLink="/login" style="color: var(--brass)">Log in</a></p>
</div>
