@if (supabase.session()) {
  <nav class="top-nav">
    <a class="brand" routerLink="/program">Loaded<span>.</span> <span class="version">v{{ version }}</span></a>
    <div class="links">
      <a routerLink="/program" routerLinkActive="active">Program</a>
      <a routerLink="/checkins" routerLinkActive="active">Check-in</a>
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      @if (isAdmin()) {
        <a routerLink="/admin" routerLinkActive="active">Admin</a>
      }
      <button class="link-btn" (click)="logout()">Log out</button>
    </div>
  </nav>
}
<div class="wrap">
  <router-outlet />
</div>
<footer class="app-footer">v{{ version }}</footer>
