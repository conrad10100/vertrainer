spring.application.name=backend
server.port=8080

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=public

supabase.jwt.jwks-uri=${SUPABASE_JWKS_URI:}
supabase.jwt.issuer=${SUPABASE_ISSUER:}
supabase.jwt.legacy-hs256-secret=${SUPABASE_LEGACY_JWT_SECRET:}

anthropic.api-key=${ANTHROPIC_API_KEY}
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-5}

app.cors.allowed-origin=${APP_CORS_ORIGIN:http://localhost:4200}
app.admin.emails=${ADMIN_EMAILS:}
